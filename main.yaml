AWSTemplateFormatVersion: "2010-09-09"
Description: Parent stack for the multi-tier application infrastructure

Parameters:
  EnvironmentName:
    Type: String
    Description: Name of the environment (e.g., dev, staging, prod)
    Default: dev
    AllowedValues:
      - dev
      - prod

  TemplateBucketName:
    Type: String
    Description: S3 bucket name where nested stack templates are stored
    Default: codegenitor-cfn-templates

Resources:
  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${TemplateBucketName}.s3.amazonaws.com/templates/network.yaml"
      Parameters:
        EnvironmentName: !Ref EnvironmentName

  SecurityStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: NetworkStack
    Properties:
      TemplateURL: !Sub "https://${TemplateBucketName}.s3.amazonaws.com/templates/security.yaml"
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        VPCId: !GetAtt NetworkStack.Outputs.VpcId

  AlbStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: SecurityStack
    Properties:
      TemplateURL: !Sub "https://${TemplateBucketName}.s3.amazonaws.com/templates/alb.yaml"
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        VpcId: !GetAtt NetworkStack.Outputs.VpcId
        PublicSubnetAId: !GetAtt NetworkStack.Outputs.PublicSubnetAId
        PublicSubnetBId: !GetAtt NetworkStack.Outputs.PublicSubnetBId
        AlbSecurityGroupId: !GetAtt SecurityStack.Outputs.AlbSecurityGroupId

  ComputeStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: AlbStack
    Properties:
      TemplateURL: !Sub "https://${TemplateBucketName}.s3.amazonaws.com/templates/compute.yaml"
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        PrivateAppSubnetAId: !GetAtt NetworkStack.Outputs.PrivateAppSubnetAId
        PrivateAppSubnetBId: !GetAtt NetworkStack.Outputs.PrivateAppSubnetBId
        AppSecurityGroupId: !GetAtt SecurityStack.Outputs.AppSecurityGroupId
        TargetGroupArn: !GetAtt AlbStack.Outputs.TargetGroupArn
        Ec2InstanceProfileName: !GetAtt SecurityStack.Outputs.Ec2InstanceProfileName

Outputs:
  VpcId:
    Description: The ID of the VPC created in the NetworkStack
    Value: !GetAtt NetworkStack.Outputs.VpcId

  AlbSecurityGroupId:
    Description: ALB Security Group ID from the security stack
    Value: !GetAtt SecurityStack.Outputs.AlbSecurityGroupId

  AppSecurityGroupId:
    Description: App Security Group ID from the security stack
    Value: !GetAtt SecurityStack.Outputs.AppSecurityGroupId

  DbSecurityGroupId:
    Description: DB Security Group ID from the security stack
    Value: !GetAtt SecurityStack.Outputs.DbSecurityGroupId

  Ec2InstanceProfileName:
    Description: EC2 Instance Profile Name from the security stack
    Value: !GetAtt SecurityStack.Outputs.Ec2InstanceProfileName

  LoadBalancerArn:
    Description: ALB ARN from the ALB stack
    Value: !GetAtt AlbStack.Outputs.LoadBalancerArn

  LoadBalancerDnsName:
    Description: ALB DNS name from the ALB stack
    Value: !GetAtt AlbStack.Outputs.LoadBalancerDnsName

  TargetGroupArn:
    Description: Target group ARN from the ALB stack
    Value: !GetAtt AlbStack.Outputs.TargetGroupArn

  AutoScalingGroupName:
    Description: Auto Scaling Group name from the compute stack
    Value: !GetAtt ComputeStack.Outputs.AutoScalingGroupName

  LaunchTemplateId:
    Description: Launch Template ID from the compute stack
    Value: !GetAtt ComputeStack.Outputs.LaunchTemplateId
