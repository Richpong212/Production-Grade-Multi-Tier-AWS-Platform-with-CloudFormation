AWSTemplateFormatVersion: "2010-09-09"
Description: "Secrets resources for the Multi-Tier CloudFormation template."

Parameters:
  EnvironmentName:
    Type: String
    Description: "Environment name"
    Default: dev

  DBName:
    Type: String
    Description: "Initial database name"
    Default: appdb

  DBUsername:
    Type: String
    Description: "Database master username"
    Default: appadmin

Resources:
  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${EnvironmentName}/database/credentials"
      Description: "Database credentials for the multi-tier application"
      GenerateSecretString:
        SecretStringTemplate: !Sub |
          {"username":"${DBUsername}","dbname":"${DBName}"}
        GenerateStringKey: "password"
        PasswordLength: 20
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-database-secret"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: "Multi-Tier CloudFormation"

Outputs:
  DatabaseSecretArn:
    Description: "ARN of the generated database secret"
    Value: !Ref DatabaseSecret

  DatabaseSecretName:
    Description: "Name of the generated database secret"
    Value: !Ref DatabaseSecret
