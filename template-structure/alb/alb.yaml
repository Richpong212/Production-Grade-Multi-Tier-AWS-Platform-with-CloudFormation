AWSTemplateFormatVersion: "2010-09-09"
Description: "Application Load Balancer resources for the Multi-Tier CloudFormation template."

Parameters:
  EnvironmentName:
    Type: String
    Description: "The name of the environment (e.g., dev, prod)."
    Default: "dev"

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: "The ID of the VPC where the ALB will be created."

  EnableHTTPS:
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "false"
    Description: "Enable HTTPS listener"

  SSLCertificateArn:
    Type: String
    Default: ""
    Description: "ACM certificate ARN"

  PublicSubnetAId:
    Type: AWS::EC2::Subnet::Id
    Description: "Public subnet A for the ALB."

  PublicSubnetBId:
    Type: AWS::EC2::Subnet::Id
    Description: "Public subnet B for the ALB."

  AlbSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: "Security group ID for the ALB."

  AppPort:
    Type: Number
    Description: "Port the application listens on."
    Default: 80

Conditions:
  HTTPSFlagEnabled: !Equals [!Ref EnableHTTPS, "true"]
  HasSSLCertificateArn: !Not [!Equals [!Ref SSLCertificateArn, ""]]
  UseHTTPS: !And
    - !Condition HTTPSFlagEnabled
    - !Condition HasSSLCertificateArn

Resources:
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${EnvironmentName}-alb"
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroupId
      Subnets:
        - !Ref PublicSubnetAId
        - !Ref PublicSubnetBId
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-alb"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: "Multi-Tier CloudFormation"

  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${EnvironmentName}-target-group"
      Port: !Ref AppPort
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthCheckPort: traffic-port
      Matcher:
        HttpCode: "200"
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-target-group"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: "Multi-Tier CloudFormation"

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - UseHTTPS
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: "443"
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref AppTargetGroup

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: UseHTTPS
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref SSLCertificateArn
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

Outputs:
  LoadBalancerArn:
    Description: "ARN of the Application Load Balancer"
    Value: !Ref ApplicationLoadBalancer

  LoadBalancerDnsName:
    Description: "DNS name of the Application Load Balancer"
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  TargetGroupArn:
    Description: "ARN of the ALB target group"
    Value: !Ref AppTargetGroup

  ListenerArn:
    Description: "ARN of the HTTP listener"
    Value: !Ref HttpListener

  HttpsListenerArn:
    Condition: UseHTTPS
    Description: "ARN of the HTTPS listener"
    Value: !Ref HttpsListener

  LoadBalancerFullName:
    Description: "Full name of the Application Load Balancer"
    Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName

  TargetGroupFullName:
    Description: "Full name of the target group"
    Value: !GetAtt AppTargetGroup.TargetGroupFullName
